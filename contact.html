<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Contact — Benjamin Cahillane</title>
<meta name="description" content="Contact contemporary artist Benjamin Cahillane — enquiries, press, and representation.">
<meta property="og:title" content="Contact — Benjamin Cahillane">
<meta property="og:description" content="Enquiries, press, and representation.">
<meta property="og:image" content="https://benjamincahillane.com/assets/og.jpg">
<meta property="og:url" content="https://benjamincahillane.com/contact.html">
<meta property="og:type" content="website">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=League+Spartan:wght@500;600&family=DM+Sans:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/assets/site.css">
<link rel="icon" type="image/png" href="/assets/favicon.png">
<link rel="apple-touch-icon" href="/assets/apple-touch-icon.png">
</head>
<body>
<div id="site-header"></div>

<main class="section">
  <div class="wrap center">
    <div class="eyebrow">Contact</div>
    <p class="lead">For enquiries about available works, press, or representation.</p>

    <form class="ajax-form inquiry-form" action="https://api.web3forms.com/submit" method="POST" style="margin-top:36px;text-align:left">
      <input type="hidden" name="access_key" value="80a4ed81-4021-4186-8798-02459c5d3434">
      <input type="hidden" name="subject" value="Contact form — cahillane.art">
      <input type="hidden" name="from_name" value="cahillane.art">
      <input type="checkbox" name="botcheck" style="display:none" tabindex="-1" autocomplete="off">
      <label>Name<input type="text" name="name" required></label>
      <label>Email<input type="email" name="email" required></label>
      <label>Message<textarea name="message" required></textarea></label>
      <label style="display:flex;align-items:center;gap:10px;flex-direction:row;font-size:14px;color:var(--muted);margin-top:6px"><input type="checkbox" name="request_private_view" value="yes" style="width:auto;margin:0"> Request access to the Private View</label>
      <button type="submit" class="btn">Send</button>
    </form>
    <div class="form-success">Thank you — we'll be in touch shortly.</div>

    <p class="form-hint" style="margin-top:40px">
      Or email <a href="mailto:info@cahillane.de" style="color:var(--ink)">info@cahillane.de</a>
      &nbsp;·&nbsp; <a href="https://instagram.com/" target="_blank" rel="noopener" style="color:var(--ink)">Instagram</a>
      <!-- TODO: real Instagram handle + studio location if desired -->
    </p>
  </div>
</main>

<div id="site-footer"></div>
<script src="/assets/include.js" defer></script>
</body>
</html>
